<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Evidencia - Luxor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0047AB; margin: 0; padding: 15px; color: #1A1D4D; }
        .form-container { max-width: 500px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border-bottom: 6px solid #F9D908; }
        .form-title { text-align: center; color: #1A1D4D; font-weight: 800; text-transform: uppercase; margin-bottom: 25px; border-bottom: 3px solid #F9D908; padding-bottom: 10px; font-size: 1.4rem; }
        
        /* Sistema de Pestañas */
        .tabs-nav { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
        .tab-button { flex: 1; padding: 12px; background: #eee; border: none; font-weight: bold; cursor: pointer; transition: all 0.3s ease; border-radius: 8px 8px 0 0; color: #555; text-transform: uppercase; font-size: 0.85rem; }
        .tab-button.active { background: #1A1D4D; color: white; border-bottom: 3px solid #F9D908; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; color: #1A1D4D; }
        select, input[type="date"], input[type="text"], input[type="file"], textarea { padding: 12px; border: 2px solid #ccc; border-radius: 8px; font-size: 1rem; color: #333; outline: none; background: #fafafa; }
        .btn-submit { background-color: #E61E25; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-regresar { background-color: #1A1D4D; color: white; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; margin-top: 15px; }
        
        #editorModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; overflow: hidden; }
        .canvas-container { border: 4px solid #F9D908; background: #000; box-shadow: 0 0 20px rgba(249, 217, 8, 0.3); display: flex; }
        .toolbar { margin-top: 15px; background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .toolbar button { border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 5px; }
        .modal-watchdog { display: flex; position: fixed; top: 10px; right: 10px; z-index: 9999; width: 350px; max-height: 90vh; overflow-y: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 3px solid #F9D908; flex-direction: column; }
        .cap-item { border-bottom: 1px solid #eee; padding: 10px 0; cursor: pointer; display: flex; align-items: center; }
        .cap-img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; margin-right: 10px; }

        /* Estilos Historial del Día */
        .reporte-card { background: #f9f9f9; border-left: 5px solid #1A1D4D; padding: 12px; margin-bottom: 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .reporte-card.operativo { border-left-color: #F9D908; }
        .reporte-card.guardia { border-left-color: #0047AB; }
        .reporte-card h5 { margin: 0 0 5px 0; font-size: 0.95rem; color: #1A1D4D; text-transform: uppercase; }
        .reporte-card p { margin: 3px 0; font-size: 0.85rem; color: #555; }
        .reporte-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
        .btn-action { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: white; display: flex; align-items: center; gap: 4px; }
        .btn-edit { background-color: #0047AB; }
        .btn-delete { background-color: #E61E25; }
        .btn-wa { background-color: #25D366; }
        .empty-history { text-align: center; color: #777; padding: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-title"><i class="fas fa-camera-retro"></i> Gestión Luxor</div>
        
        <div class="tabs-nav">
            <button class="tab-button active" onclick="cambiarPestaña('tab-registro', event)">Registro</button>
            <button class="tab-button" onclick="cambiarPestaña('tab-historial', event); cargarHistorialDelDia();">Historial del Día</button>
        </div>

        <div id="tab-registro" class="tab-content active">
            <form id="mainForm" action="{{ url_for('cargar_datos') }}" method="POST" enctype="multipart/form-data">
                <input type="hidden" id="edit_report_id" name="edit_report_id" value="">
                <input type="hidden" id="tipo_reporte_oculto" name="tipo_reporte_oculto" value="">
                <input type="hidden" id="tipo_reporte_real_post" name="tipo_reporte_real_post" value="">

                <div class="form-group">
                    <label>Tipo de Reporte</label>
                    <select id="tipoReporteSelector" onchange="actualizarInterfaz()">
                        <option value="incidencia">Incidencia</option>
                        <option value="operativo">Reporte de Apertura</option>		                
                        <option value="incidencia">Reporte de Cierre</option>
                        <option value="operativo">Reporte de Apertura Gerencial</option>
                        <option value="incidencia">Reporte de Cierre Gerencial</option>
                        <option value="incidencia">Apertura de Guardia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                <div class="form-group" id="contenedorSucursal">
                    <label>Sucursal</label>
                    <select id="sucursal" name="sucursal" required>
                        <option value="" disabled selected>-- Selecciona Sucursal --</option>
                        {% for suc in sucursales %} <option value="{{ suc }}">{{ suc }}</option> {% endfor %}
                    </select>
                </div>
                
                <div class="form-group" id="contenedorMonitorista" style="display: none;">
                    <label>Monitorista</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="monitorista" name="monitorista">
                            <option value="" disabled selected>-- Selecciona Monitorista --</option>
                        </select>
                        <button type="button" onclick="crearMonitorista()" style="background: #1A1D4D; color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; transition: 0.3s;" title="Agregar Monitorista">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group" id="contenedorTurno" style="display: none;">
                    <label>Turno</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="turno" name="turno">
                            <option value="" disabled selected>-- Selecciona Turno --</option>
                        </select>
                        <button type="button" onclick="crearTurno()" style="background: #1A1D4D; color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; transition: 0.3s;" title="Agregar Turno">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group" id="contenedorIncidencia">
                    <label>Incidencia</label>
                    <select id="incidencia" name="incidencia">
                        <option value="" disabled selected>-- Selecciona Incidencia --</option>
                        {% for inc in incidencias %} <option value="{{ inc.cod }}|{{ inc.desc }}">{{ inc.cod }} - {{ inc.desc }}</option> {% endfor %}
                    </select>
                </div>
                
                <div class="form-group" id="contenedorFoto">
                    <label>Evidencia Fotográfica</label>
                    <input type="file" id="foto" name="foto" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="observaciones" name="observaciones" placeholder="Escribe observaciones adicionales..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Guardar Registro</button>
                <button type="button" onclick="enviarWhatsApp()" style="background:#25D366; color:white; border:none; padding:14px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px;">
                    <i class="fab fa-whatsapp"></i> Enviar por WhatsApp
                </button>
            </form>
        </div>

        <div id="tab-historial" class="tab-content">
            <div id="listaHistorialDia"></div>
        </div>

        <a href="{{ url_for('panel') }}" class="btn-regresar">Volver al Menú</a>
    </div>

    <div id="editorModal">
        <div class="canvas-container"><canvas id="c"></canvas></div>
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#E61E25" style="border:none; height:35px; border-radius:5px; cursor:pointer;">
            <select id="shapeSelect" onchange="handleShapeSelection(this.value)" style="padding: 8px; border-radius: 5px;">
                <option value="">-- Agregar Figura --</option>
                <option value="rect">Cuadrado</option>
                <option value="circle">Círculo</option>
                <option value="arrow">Flecha</option>
                <option value="text">Cuadro de Texto</option>
            </select>
            <button type="button" onclick="eliminarFiguraSeleccionada()" style="background:#E61E25;"><i class="fas fa-trash-alt"></i> Eliminar Selección</button>
            <button type="button" onclick="saveAndClose()" style="background:#0047AB;"><i class="fas fa-save"></i> Guardar</button>
            <button type="button" onclick="document.getElementById('editorModal').style.display='none'" style="background:#555;"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>

    <div class="modal-watchdog" id="historialModal">
        <h4>Últimas Capturas</h4>
        <div id="listaCapturas"></div>
    </div>

    <script>
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

        document.addEventListener("DOMContentLoaded", () => {
            cargarMonitoristas();
            cargarTurnos();
            actualizarInterfaz(); 
            const activeTab = localStorage.getItem("activeTab") || "tab-registro";
            if (activeTab === "tab-historial") {
                cambiarPestaña('tab-historial');
                cargarHistorialDelDia();
            } else {
                cambiarPestaña('tab-registro');
            }
        });

        async function cargarMonitoristas() {
            const select = document.getElementById('monitorista');
            try {
                const response = await fetch('/api/monitoristas');
                if (!response.ok) return;
                const monitoristas = await response.json();
                select.innerHTML = '<option value="" disabled selected>-- Selecciona Monitorista --</option>';
                monitoristas.forEach(m => {
                    select.innerHTML += `<option value="${m}">${m}</option>`;
                });
            } catch (err) {
                console.error("Error al cargar monitoristas:", err);
            }
        }

        async function crearMonitorista() {
            const nuevo = prompt("Ingrese el nombre completo del nuevo monitorista:");
            if (nuevo && nuevo.trim() !== "") {
                const nombreLimpio = nuevo.trim().toUpperCase();
                try {
                    const response = await fetch('/api/monitoristas', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ nombre: nombreLimpio })
                    });
                    const resData = await response.json();
                    if (resData.success) {
                        await cargarMonitoristas();
                        document.getElementById('monitorista').value = nombreLimpio;
                    } else {
                        alert(resData.msg);
                    }
                } catch (err) {
                    alert("Error de conexión al guardar el monitorista.");
                }
            }
        }

        async function cargarTurnos() {
            const select = document.getElementById('turno');
            try {
                const response = await fetch('/api/turnos');
                if (!response.ok) return;
                const turnos = await response.json();
                select.innerHTML = '<option value="" disabled selected>-- Selecciona Turno --</option>';
                turnos.forEach(t => {
                    select.innerHTML += `<option value="${t}">${t}</option>`;
                });
            } catch (err) {
                console.error("Error al cargar turnos:", err);
            }
        }

        async function crearTurno() {
            const nuevo = prompt("Ingrese la descripción del nuevo turno (ej. DIURNO, NOCTURNO):");
            if (nuevo && nuevo.trim() !== "") {
                const turnoLimpio = nuevo.trim().toUpperCase();
                try {
                    const response = await fetch('/api/turnos', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ nombre: turnoLimpio })
                    });
                    const resData = await response.json();
                    if (resData.success) {
                        await cargarTurnos();
                        document.getElementById('turno').value = turnoLimpio;
                    } else {
                        alert(resData.msg);
                    }
                } catch (err) {
                    alert("Error de conexión al guardar el turno.");
                }
            }
        }

        function cambiarPestaña(tabId, eventObj = null) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if (eventObj && eventObj.currentTarget) {
                eventObj.currentTarget.classList.add('active');
            } else {
                if(tabId === 'tab-registro') document.querySelectorAll('.tab-button')[0].classList.add('active');
                if(tabId === 'tab-historial') document.querySelectorAll('.tab-button')[1].classList.add('active');
            }
            
            localStorage.setItem("activeTab", tabId);
        }

        function actualizarInterfaz() {
            const selector = document.getElementById('tipoReporteSelector');
            const textoSeleccionado = selector.options[selector.selectedIndex].text;
            const esAperturaGuardia = (textoSeleccionado === 'Apertura de Guardia');
            
            document.getElementById('tipo_reporte_oculto').value = esAperturaGuardia ? 'apertura_guardia' : '';
            // Inyectamos el texto exacto seleccionado para procesarlo en Python
            document.getElementById('tipo_reporte_real_post').value = textoSeleccionado;

            document.getElementById('contenedorIncidencia').style.display = (textoSeleccionado === 'Incidencia') ? 'flex' : 'none';
            document.getElementById('contenedorMonitorista').style.display = esAperturaGuardia ? 'flex' : 'none';
            document.getElementById('contenedorTurno').style.display = esAperturaGuardia ? 'flex' : 'none';
            document.getElementById('contenedorFoto').style.display = esAperturaGuardia ? 'none' : 'flex';
            
            const contenedorSucursal = document.getElementById('contenedorSucursal');
            const selectSucursal = document.getElementById('sucursal');
            if (esAperturaGuardia) {
                contenedorSucursal.style.display = 'none';
                selectSucursal.removeAttribute('required');
                selectSucursal.value = "";
                document.getElementById('monitorista').setAttribute('required', 'required');
                document.getElementById('turno').setAttribute('required', 'required');
            } else {
                contenedorSucursal.style.display = 'flex';
                selectSucursal.setAttribute('required', 'required');
                document.getElementById('monitorista').removeAttribute('required');
                document.getElementById('turno').removeAttribute('required');
            }

            document.getElementById('foto').required = !esAperturaGuardia;
        }

        const socket = io();
        let canvas, historial = [];
        let reportesDelDia = [];

        socket.on('nueva_captura_ivms', (data) => {
            historial.unshift(data);
            if (historial.length > 5) historial.pop();
            renderizarHistorial();
        });

        function renderizarHistorial() {
            document.getElementById('listaCapturas').innerHTML = historial.map(c => `
                <div class="cap-item" onclick="abrirEditor('${c.url_foto}', '${c.sucursal_sugerida}')">
                    <img src="${c.url_foto}" class="cap-img">
                    <div><b>${c.sucursal_sugerida}</b></div>
                </div>
            `).join('');
        }

        function abrirEditor(url, suc) {
            document.getElementById('editorModal').style.display = 'flex';
            document.getElementById('sucursal').value = suc;
            
            const imgObj = new Image();
            imgObj.crossOrigin = "anonymous";
            imgObj.src = url;
            imgObj.onload = function() {
                if (canvas) canvas.dispose();
                const viewportH = window.innerHeight * 0.7;
                const scale = viewportH / this.height;
                canvas = new fabric.Canvas('c', { width: this.width * scale, height: viewportH });
                fabric.Image.fromURL(url, (img) => {
                    img.scale(scale);
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { originX: 'left', originY: 'top' });
                }, { crossOrigin: "anonymous" });
            };
        }

        // --- SISTEMA DE DIBUJO PROFESIONAL CORREGIDO ---
        function handleShapeSelection(type) {
            if (!canvas || type === "") return;
            const color = document.getElementById('colorPicker').value;
            let shape;
            switch(type) {
                case 'rect': 
                    shape = new fabric.Rect({ left: 50, top: 50, width: 100, height: 100, fill: 'transparent', stroke: color, strokeWidth: 5, strokeUniform: true }); 
                    break;
                case 'circle': 
                    shape = new fabric.Circle({ left: 50, top: 50, radius: 50, fill: 'transparent', stroke: color, strokeWidth: 5, strokeUniform: true }); 
                    break;
                case 'arrow': 
                    // Renderizado matemático de la flecha con SVG path
                    shape = new fabric.Path('M 0 0 L 100 0 M 100 0 L 85 -10 M 100 0 L 85 10', { 
                        left: 50, top: 50, fill: 'transparent', stroke: color, strokeWidth: 5, strokeUniform: true 
                    }); 
                    break;
                case 'text': 
                    // Renderizado de cuadro de texto adaptable y editable
                    shape = new fabric.Textbox('DOBLE CLIC PARA EDITAR', { 
                        left: 50, top: 50, width: 250, fill: color, fontSize: 28, fontWeight: 'bold' 
                    }); 
                    break;
            }
            if (shape) { 
                canvas.add(shape); 
                canvas.setActiveObject(shape); 
            }
            
            // UX: Devolver el select a estado nulo para permitir clicks seguidos en la misma figura
            document.getElementById('shapeSelect').value = "";
        }

        // Función élite para eliminar las figuras activas
        function eliminarFiguraSeleccionada() {
            if (!canvas) return;
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    canvas.remove(object);
                });
            }
        }

        // Listener para eliminar pulsando la tecla "Suprimir/Delete" en teclado
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('editorModal').style.display === 'flex') {
                if (e.key === 'Delete') {
                    // Evitar borrar si el usuario está dentro editando el texto
                    if (canvas && canvas.getActiveObject() && canvas.getActiveObject().isEditing) return;
                    eliminarFiguraSeleccionada();
                }
            }
        });
        // ------------------------------------------------

        async function saveAndClose() {
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 1.0 });
            const res = await fetch(dataURL);
            const blob = await res.blob();
            const nombreArchivo = "temp_evidencia.jpg";
            const dt = new DataTransfer();
            dt.items.add(new File([blob], nombreArchivo, {type: "image/jpeg"}));
            document.getElementById('foto').files = dt.files;
            document.getElementById('editorModal').style.display = 'none';
            
            const formData = new FormData();
            formData.append("foto", blob, nombreArchivo);
            await fetch('/guardar_temporal', { method: 'POST', body: formData });
        }

        async function enviarWhatsApp() {
            const selector = document.getElementById('tipoReporteSelector');
            const textoTipo = selector.options[selector.selectedIndex].text;
            const inputFoto = document.getElementById('foto');

            if (textoTipo !== 'Apertura de Guardia') {
                if (inputFoto.files.length === 0) { 
                    alert("Por favor selecciona o edita una foto primero."); 
                    return; 
                }
                const formData = new FormData();
                formData.append("foto", inputFoto.files[0]);

                await fetch('/api/preparar_whatsapp', {
                    method: 'POST',
                    body: formData
                });
            }

            const fecha = document.getElementById('fecha').value;
            const sucursal = document.getElementById('sucursal').value;
            const incidenciaTexto = document.getElementById('incidencia').options[document.getElementById('incidencia').selectedIndex]?.text || '';
            const observaciones = document.getElementById('observaciones').value;
            const monitorista = document.getElementById('monitorista').value;
            const turno = document.getElementById('turno').value;

            let mensaje = `${textoTipo.toUpperCase()}\n*Fecha:* ${fecha}`;
            
            if (textoTipo !== 'Apertura de Guardia') {
                mensaje += `\n*Sucursal:* ${sucursal}`;
            }
            if (textoTipo === 'Incidencia' && incidenciaTexto) {
                mensaje += `\n*Incidencia:* ${incidenciaTexto}`;
            }
            if (textoTipo === 'Apertura de Guardia') {
                if (monitorista) mensaje += `\n*Monitorista:* ${monitorista}`;
                if (turno) mensaje += `\n*Turno:* ${turno}`;
            }
            if (observaciones && observaciones.trim() !== '') {
                mensaje += `\n*Observaciones:* ${observaciones}`;
            }

            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            const selector = document.getElementById('tipoReporteSelector');
            const textoSeleccionado = selector.options[selector.selectedIndex].text;
            
            if (textoSeleccionado === 'Apertura de Guardia') {
                const inputFoto = document.getElementById('foto');
                if (inputFoto.files.length === 0) {
                    const canvasDummy = document.createElement('canvas');
                    canvasDummy.width = 1; canvasDummy.height = 1;
                    canvasDummy.toBlob(function(blob) {
                        const dt = new DataTransfer();
                        dt.items.add(new File([blob], "dummy_guardia.jpg", {type: "image/jpeg"}));
                        inputFoto.files = dt.files;
                        HTMLFormElement.prototype.submit.call(document.getElementById('mainForm'));
                    }, 'image/jpeg');
                    e.preventDefault(); 
                    return;
                }
            }
            localStorage.setItem("activeTab", "tab-historial"); 
        });

        async function cargarHistorialDelDia() {
            const contenedor = document.getElementById('listaHistorialDia');
            contenedor.innerHTML = '<div class="empty-history"><i class="fas fa-spinner fa-spin"></i> Sincronizando datos...</div>';

            try {
                const response = await fetch('/api/reportes_del_dia');
                if (!response.ok) throw new Error('Error en la respuesta del servidor');
                
                const datosBrutos = await response.json();

                const vistos = new Set();
                reportesDelDia = datosBrutos.filter(rep => {
                    if (vistos.has(rep.id)) return false;
                    vistos.add(rep.id);
                    return true;
                });

                if (reportesDelDia.length === 0) {
                    contenedor.innerHTML = `<div class="empty-history">No hay registros encontrados en el servidor para hoy.</div>`;
                    return;
                }

                contenedor.innerHTML = reportesDelDia.map(rep => {
                    let badgeEstilo = '';
                    if (rep.tipo !== 'Incidencia') {
                        badgeEstilo = (rep.tipo === 'Apertura de Guardia') ? 'guardia' : 'operativo';
                    }

                    return `
                        <div class="reporte-card ${badgeEstilo}" id="rep-${rep.id}">
                            <h5><i class="fas fa-file-alt"></i> ${rep.tipo}</h5>
                            ${rep.sucursal ? `<p><b>Sucursal:</b> ${rep.sucursal}</p>` : ''}
                            <p><b>Fecha:</b> ${rep.fecha}</p>
                            ${rep.tipo === 'Incidencia' && rep.incidenciaTexto ? `<p><b>Detalle:</b> ${rep.incidenciaTexto}</p>` : ''}
                            ${rep.monitorista ? `<p><b>Monitorista:</b> ${rep.monitorista}</p>` : ''}
                            ${rep.turno ? `<p><b>Turno:</b> ${rep.turno}</p>` : ''}
                            ${rep.observaciones ? `<p><b>Observaciones:</b> ${rep.observaciones}</p>` : ''}
                            <div class="reporte-actions">
                                <button type="button" class="btn-action btn-wa" onclick="enviarWhatsAppHistorial(${rep.id})" title="WhatsApp"><i class="fab fa-whatsapp"></i></button>
                                <button type="button" class="btn-action btn-edit" onclick="modificarReporte(${rep.id})" title="Editar"><i class="fas fa-edit"></i></button>
                                <button type="button" class="btn-action btn-delete" onclick="borrarReporte(${rep.id})" title="Borrar"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error al sincronizar historial:", error);
                contenedor.innerHTML = `<div class="empty-history" style="color:red;">Error al conectar con el servidor. Verifica el log.</div>`;
            }
        }

        function modificarReporte(id) {
            const rep = reportesDelDia.find(r => r.id === id);
            if (!rep) return;

            document.getElementById('edit_report_id').value = id;
            
            const selector = document.getElementById('tipoReporteSelector');
            for(let i=0; i<selector.options.length; i++){
                if(selector.options[i].text === rep.tipo){
                    selector.selectedIndex = i;
                    break;
                }
            }

            actualizarInterfaz();
            
            document.getElementById('fecha').value = rep.fecha;
            if (rep.sucursal) document.getElementById('sucursal').value = rep.sucursal;
            document.getElementById('observaciones').value = rep.observaciones || '';
            
            if (rep.incidenciaValor) {
                document.getElementById('incidencia').value = rep.incidenciaValor;
            }
            
            setTimeout(() => {
                if (rep.monitorista) document.getElementById('monitorista').value = rep.monitorista;
                if (rep.turno) document.getElementById('turno').value = rep.turno;
            }, 200);

            cambiarPestaña('tab-registro');
            alert("✨ MODO EDICIÓN ACTIVADO ✨\n\nLos datos fueron cargados. Sube la evidencia corregida y al presionar 'Guardar Registro' se reemplazará automáticamente la entrada anterior.");
        }

        async function borrarReporte(id) {
            if (!confirm("¿Estás seguro de que deseas eliminar este reporte del sistema permanentemente?")) return;
            
            try {
                const response = await fetch(`/api/reportes/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    cargarHistorialDelDia(); 
                } else {
                    alert("Error al eliminar el reporte: " + result.msg);
                }
            } catch(error) {
                console.error("Error:", error);
                alert("Error de conexión al eliminar.");
            }
        }

        async function enviarWhatsAppHistorial(id) {
            const rep = reportesDelDia.find(r => r.id === id);
            if (!rep) return;

            if (rep.ruta_relativa && rep.tipo !== 'Apertura de Guardia') {
                await fetch('/api/preparar_whatsapp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ruta_img: rep.ruta_relativa }) 
                });
            }

            let mensaje = `${rep.tipo.toUpperCase()}\n*Fecha:* ${rep.fecha}`;
            
            if (rep.sucursal) {
                mensaje += `\n*Sucursal:* ${rep.sucursal}`;
            }
            if (rep.incidenciaTexto && rep.tipo === 'Incidencia') {
                mensaje += `\n*Incidencia:* ${rep.incidenciaTexto}`;
            }
            if (rep.monitorista) {
                mensaje += `\n*Monitorista:* ${rep.monitorista}`;
            }
            if (rep.turno) {
                mensaje += `\n*Turno:* ${rep.turno}`;
            }
            if (rep.observaciones && rep.observaciones !== "Evidencia registrada en sistema.") {
                mensaje += `\n*Observaciones:* ${rep.observaciones}`;
            }

            window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>
</body>
</html>
